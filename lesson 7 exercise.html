<!DOCTYPE html>
<html>
  <head>
    <title>Lesson 7 Exercises - Functions</title>
  </head>
  <body>
    <script>
      function greet(name) {
        if (!name) {
          console.log('Hi there!');
        } else {
          console.log(`Hello ${name}!`);
        }
      }

      greet('Mary');
      greet('John');
      greet('Ruth');
      greet('Rachael');
      greet();

    </script>
  </body>
</html>
